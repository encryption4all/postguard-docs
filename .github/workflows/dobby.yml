name: Dobby AI Agent

on:
  # Trigger on issue label
  issues:
    types: [labeled]
  # Trigger on issue/PR comments
  issue_comment:
    types: [created]
  # Trigger on PR review comments
  pull_request_review_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  dobby:
    runs-on: ubuntu-latest
    # Trigger on "dobby" label OR "@dobby"/"/dobby" in a comment
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'dobby') ||
      (github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, '@dobby') ||
        contains(github.event.comment.body, '/dobby')
      )) ||
      (github.event_name == 'pull_request_review_comment' && (
        contains(github.event.comment.body, '@dobby') ||
        contains(github.event.comment.body, '/dobby')
      ))

    steps:
      - name: Install Coder CLI
        run: |
          curl -L https://coder.com/install.sh | sh
          sudo mv ./coder /usr/local/bin/coder

      - name: Configure Coder
        run: |
          coder login ${{ secrets.CODER_URL }} --token ${{ secrets.CODER_TOKEN }}

      - name: Create Coder Task
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          coder exp task create \
            --template dobby \
            --name "dobby-issue-${ISSUE_NUMBER}" \
            --prompt "You are Dobby, an AI coding agent. You have been triggered from GitHub.

          Use the gh CLI to read the full issue/PR context:
          gh issue view ${ISSUE_NUMBER} --repo ${{ github.repository }} --comments

          Your task:
          - Read the issue/PR and all comments carefully
          - Clone the repository and understand the codebase
          - Implement the requested changes or review
          - Run tests to verify your changes work
          - Create a DRAFT pull request with a clear description
          - Link back to the original issue #${ISSUE_NUMBER}"

      - name: Comment on Issue
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          gh issue comment ${ISSUE_NUMBER} --repo ${{ github.repository }} \
            --body "🤖 Dobby is working on this! I'll create a draft PR when ready."
        env:
          GH_TOKEN: ${{ github.token }}
