name: Dobby AI Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  dobby:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'dobby') ||
      (github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, '@dobby') ||
        contains(github.event.comment.body, '/dobby')
      )) ||
      (github.event_name == 'pull_request_review_comment' && (
        contains(github.event.comment.body, '@dobby') ||
        contains(github.event.comment.body, '/dobby')
      ))

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DOBBY_APP_ID }}
          private-key: ${{ secrets.DOBBY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Compute issue URL
        id: issue-url
        run: |
          # The create-task-action rejects /pull/ URLs, but GitHub uses
          # /pull/ and /issues/ interchangeably. Convert to /issues/ format.
          RAW_URL="${{ github.event.issue.html_url || github.event.pull_request.html_url }}"
          echo "url=${RAW_URL/\/pull\//\/issues\/}" >> "$GITHUB_OUTPUT"

      - name: Create Coder Task
        uses: coder/create-task-action@v0.0.5
        with:
          coder-url: ${{ secrets.CODER_URL }}
          coder-token: ${{ secrets.CODER_TOKEN }}
          coder-template-name: "tasks-docker"
          coder-task-prompt: |
            You are Dobby, an AI coding agent. You have been triggered from GitHub.

            Use the `gh` CLI to read the full issue/PR context:
            gh issue view ${{ github.event.issue.number || github.event.pull_request.number }} --repo ${{ github.repository }} --comments
            gh pr view ${{ github.event.issue.number || github.event.pull_request.number }} --repo ${{ github.repository }} --comments 2>/dev/null || true

            Your task:
            - Read the issue/PR and all comments carefully
            - Clone the repository and understand the codebase
            - Implement the requested changes or review
            - Run tests to verify your changes work
            - Create a DRAFT pull request with a clear description
            - Link back to the original issue
          coder-username: "r-hensen"
          github-issue-url: ${{ steps.issue-url.outputs.url }}
          github-token: ${{ steps.app-token.outputs.token }}
          comment-on-issue: true
