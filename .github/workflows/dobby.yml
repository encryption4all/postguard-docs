name: Dobby AI Agent

on:
  # Trigger on issue/PR comments
  issue_comment:
    types: [created]
  # Trigger on PR review comments
  pull_request_review_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  dobby:
    runs-on: ubuntu-latest
    # Trigger on "@dobby" or "/dobby" in a comment
    if: |
      (github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, '@dobby') ||
        contains(github.event.comment.body, '/dobby')
      )) ||
      (github.event_name == 'pull_request_review_comment' && (
        contains(github.event.comment.body, '@dobby') ||
        contains(github.event.comment.body, '/dobby')
      ))

    steps:
      - name: Install Coder CLI
        run: |
          curl -L https://coder.com/install.sh | sh

      - name: Configure Coder
        run: |
          coder login ${{ secrets.CODER_URL }} --token ${{ secrets.CODER_TOKEN }}

      - name: Create Coder Workspace
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          coder create dobby-issue-${ISSUE_NUMBER} \
            --template dobby \
            --yes

      - name: Comment on Issue
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          gh issue comment ${ISSUE_NUMBER} --repo ${{ github.repository }} \
            --body "🤖 Dobby is working on this! I'll create a draft PR when ready."
        env:
          GH_TOKEN: ${{ github.token }}
